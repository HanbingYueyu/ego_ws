TebLocalPlannerROS:
  odom_topic: /tricycle/odom
  map_frame: odom

  teb_autosize: true
  dt_ref: 0.3
  dt_hysteresis: 0.1
  max_samples: 500
  global_plan_overwrite_orientation: true
  allow_init_with_backwards_motion: false
  max_global_plan_lookahead_dist: 8.0

  max_vel_x: 1.0
  max_vel_x_backwards: 0.2
  max_vel_theta: 0.45
  acc_lim_x: 1.0
  acc_lim_theta: 0.5

  min_turning_radius: 1.35
  wheelbase: 1.14
  cmd_angle_instead_rotvel: false

  footprint_model:
    type: "polygon"
    vertices: [[0.85, 0.35], [0.85, -0.35], [-0.35, -0.35], [-0.35, 0.35]]

  xy_goal_tolerance: 0.4
  yaw_goal_tolerance: 0.5
  free_goal_vel: false
  complete_global_plan: false

  min_obstacle_dist: 0.45
  inflation_dist: 0.7
  include_costmap_obstacles: true
  costmap_obstacles_behind_robot_dist: 1.0
  obstacle_poses_affected: 20

  no_inner_iterations: 5
  no_outer_iterations: 4
  optimization_activate: true
  optimization_verbose: false
  penalty_epsilon: 0.1
  weight_kinematics_nh: 1000.0
  weight_kinematics_forward_drive: 100.0
  weight_optimaltime: 5.0
  weight_obstacle: 50.0
  weight_viapoint: 1.0

  enable_homotopy_class_planning: true
  enable_multithreading: true
  max_number_classes: 3
